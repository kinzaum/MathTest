<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Practice</title>
    <link rel="stylesheet" href="style.css">
    <meta name="monetag" content="cf1e23984a60409396c2aa7296bb8bce">
</head>
<body>

    <div class="game-container">
        <h1 id="title">Math Practice</h1>

<div id="settings-panel" class="hidden">
    <h3>Personalize Expressions</h3> <textarea id="custom-expressions" placeholder="e.g. 5+5, 10-2, 3x4"></textarea>

     <button id="save-settings">Save & Apply</button> </div>

        <div id="expression">Loading...</div>
        <div id="transcript-display"></div>
        <div id="result"></div>
        
        <button id="ready-btn">Ready to Answer</button>
        
        <div class="settings-bar">

            <button id="settings-toggle">⚙️ Settings</button>
            <select id="operation">
                <option value="addition">Addition</option>
                <option value="subtraction">Subtraction</option>
                <option value="multiplication">Multiplication</option>
                <option value="division">Division</option>
                <option value="exponents">Exponents</option>
                <option value="squareRoots">Square Roots</option>
            </select>

            <select id="lang-select">
                <option value="en-US">English</option>
                <option value="pt-BR">Português</option>
                <option value="es-ES">Español</option>
            </select>
        </div>
    </div>
    <script>(function(s){s.dataset.zone='11088070',s.src='https://nap5k.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>
    <script src="script.js"></script>
</body>
</html>
