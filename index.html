<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <h1 id="title">Math Test</h1>
        
        <div id="expression">Loading...</div>
        <div id="transcript-display"></div>
        <div id="result"></div>
        
        <button id="ready-btn">Ready to Answer</button>
        
        <div class="settings-bar">
            <select id="operation">
                <option value="addition">Addition</option>
                <option value="subtraction">Subtraction</option>
                <option value="multiplication">Multiplication</option>
                <option value="division">Division</option>
                <option value="exponents">Exponents</option>
                <option value="squareRoots">Square Roots</option>
            </select>

            <select id="lang-select">
                <option value="en-US">English</option>
                <option value="pt-BR">Português</option>
                <option value="es-ES">Español</option>
            </select>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
